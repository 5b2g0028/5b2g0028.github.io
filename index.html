<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1b4b, #0f172a);
    color: white;
}

/* 導覽列 */
nav {
    position: fixed;
    width: 100%;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
    padding: 15px;
    text-align: center;
    z-index: 1000;
}

nav a {
    color: #cbd5f5;
    margin: 0 15px;
    text-decoration: none;
}

nav a:hover {
    color: #a78bfa;
}

/* 首頁 */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.hero h1 {
    font-size: 3em;
}

.hero p {
    margin-top: 10px;
    color: #cbd5f5;
}

/* 區塊 */
section {
    padding: 80px 20px;
    max-width: 1000px;
    margin: auto;
}

/* 卡片 */
.card {
    background: rgba(255,255,255,0.1);
    padding: 25px;
    border-radius: 20px;
    margin: 15px 0;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

/* 標題 */
h2 {
    margin-bottom: 20px;
    border-left: 5px solid #a78bfa;
    padding-left: 10px;
}

/* 動畫 */
.fade {
    opacity: 0;
    transform: translateY(20px);
    transition: 1s;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

/* footer */
footer {
    text-align: center;
    padding: 20px;
    color: #94a3b8;
}
</style>

</head>

<body>

<nav>
    <a href="#about">About</a>
    <a href="#hw">Homework</a>
    <a href="#contact">Contact</a>
</nav>

<div class="hero">
    <h1>余峻豪</h1>
    <p>Student Portfolio Website</p>
</div>

<section id="about" class="fade">
    <h2>👤 About Me</h2>
    <div class="card">
        <p>姓名：余峻豪</p>
        <p>科系：資工系</p>
        <p>興趣：打遊戲</p>
    </div>
</section>

<section id="hw" class="fade">
    <h2>📚 Homework</h2>
    <div class="grid">
        <div class="card">HW1 - 作業內容</div>
        <div class="card">HW2 - 作業內容</div>
        <div class="card">HW3 - 作業內容</div>
    </div>
</section>


<section id="contact" class="fade">
    <h2>📫 Contact</h2>
    <div class="card">
        <p>Email：5b2g0028@stust.edu.tw</p>
    </div>
</section>

<footer>
    <p>© 2026 余峻豪</p>
</footer>

<script>
const faders = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
    const trigger = window.innerHeight * 0.85;

    faders.forEach(el => {
        const top = el.getBoundingClientRect().top;

        if(top < trigger){
            el.classList.add('show');
        }
    });
});
</script>

</body>
</html>
