<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>我的個人網站</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f8;
        }

        header {
            background-color: #4a90e2;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        section {
            padding: 40px;
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        footer {
            text-align: center;
            padding: 15px;
            background-color: #333;
            color: white;
        }
    </style>
</head>

<body>

<header>
    <h1>你的名字</h1>
    <p>個人網站 / 作業展示</p>
</header>

<nav>
    <a href="#about">自我介紹</a>
    <a href="#homework">作業</a>
    <a href="#projects">作品</a>
    <a href="#contact">聯絡我</a>
</nav>

<section id="about">
    <div class="card">
        <h2>👤 自我介紹</h2>
        <p>姓名：你的名字</p>
        <p>科系：你的科系</p>
        <p>興趣：寫程式 / 打遊戲 / 看電影（自己改）</p>
    </div>
</section>

<section id="homework">
    <div class="card">
        <h2>📂 作業區</h2>
        <ul>
            <li><a href="#">HW1 - 作業名稱</a></li>
            <li><a href="#">HW2 - 作業名稱</a></li>
            <li><a href="#">HW3 - 作業名稱</a></li>
        </ul>
    </div>
</section>

<section id="projects">
    <div class="card">
        <h2>💻 作品展示</h2>
        <p>這裡可以放你的專題或練習作品</p>
        <ul>
            <li>作品1：簡單網站設計</li>
            <li>作品2：小遊戲</li>
        </ul>
    </div>
</section>

<section id="contact">
    <div class="card">
        <h2>📫 聯絡方式</h2>
        <p>Email：your@email.com</p>
        <p>IG：your_instagram（可選）</p>
    </div>
</section>

<footer>
    <p>© 2026 你的名字</p>
</footer>

</body>
</html>
